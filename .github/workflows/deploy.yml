name: Deploy Backoffice to GCS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  BUCKET: prod-depfund-backoffice
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backoffice/package-lock.json

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Install dependencies
        working-directory: backoffice
        run: npm ci

      - name: Build
        working-directory: backoffice
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.BACKOFFICE_API_URL }}

      - name: Upload to GCS
        working-directory: backoffice
        run: |
          gsutil -m rsync -r -d dist/ gs://$BUCKET/
          gsutil -m setmeta -h "Cache-Control:no-cache,no-store,must-revalidate" gs://$BUCKET/**/*.html
          gsutil -m setmeta -h "Cache-Control:public,maxage=31536000" gs://$BUCKET/**/*.{js,css,png,jpg,svg,ico,woff2}

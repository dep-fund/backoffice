name: Build & Push Backoffice

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  REGISTRY: us-central1-docker.pkg.dev
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REPOSITORY: depfund
  IMAGE: backoffice

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker $REGISTRY

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.BACKOFFICE_API_URL }}

      - name: Build & Push
        run: |
          SHA_SHORT=$(echo $GITHUB_SHA | head -c 7)
          TAG_SHA="$REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE:$SHA_SHORT"
          TAG_LATEST="$REGISTRY/$PROJECT_ID/$REPOSITORY/$IMAGE:latest"
          docker build -t $TAG_SHA -t $TAG_LATEST .
          docker push $TAG_SHA
          docker push $TAG_LATEST
